<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Multi LAY Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface-2: #1a1e2a;
    --surface-3: #21263a;
    --amber: #f5a623;
    --amber-dim: rgba(245, 166, 35, 0.12);
    --green: #00c48c;
    --green-dim: rgba(0, 196, 140, 0.12);
    --red: #ff4d6d;
    --red-dim: rgba(255, 77, 109, 0.12);
    --text: #e8ecf4;
    --text-muted: #6b7591;
    --text-faint: #3d4460;
    --border: rgba(255,255,255,0.06);
    --border-bright: rgba(255,255,255,0.12);
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245,166,35,0.07) 0%, transparent 70%);
}

/* HEADER */
.header {
    padding: 22px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(16px);
    z-index: 100;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
    width: 34px; height: 34px; background: var(--amber); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: #0d0f14; font-weight: bold;
}
.logo-text { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.02em; }
.logo-text span { color: var(--amber); }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-hint {
    font-family: var(--mono); font-size: 0.68rem;
    color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase;
}
.btn-hist {
    font-family: var(--display); background: var(--surface-2);
    border: 1px solid var(--border-bright); color: var(--text-muted);
    padding: 7px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
}
.btn-hist:hover { border-color: var(--amber); color: var(--amber); }

/* LAYOUT */
.container {
    max-width: 1160px; margin: auto;
    padding: 28px 24px;
    display: grid; grid-template-columns: 360px 1fr;
    gap: 24px; align-items: start;
}
.sidebar { display: flex; flex-direction: column; gap: 14px; position: sticky; top: 88px; }

/* CARD */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
.card-title {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-faint); margin-bottom: 14px;
}

/* INPUTS */
.input-wrap { position: relative; }
.input-prefix {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 0.8rem; color: var(--amber); font-weight: 600; pointer-events: none;
}
input[type="number"] {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border-bright);
    border-radius: 10px; color: var(--text); font-family: var(--mono);
    font-size: 0.95rem; font-weight: 500; padding: 11px 12px 11px 36px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -moz-appearance: textfield; appearance: textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"]:focus { border-color: var(--amber); background: var(--surface-3); box-shadow: 0 0 0 3px var(--amber-dim); }
input[type="number"]::placeholder { color: var(--text-faint); font-size: 0.82rem; }
input.no-prefix { padding-left: 12px; }

/* MIN STAKE */
.min-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
}
.min-label { font-size: 0.73rem; color: var(--text-muted); }
.min-input-wrap { width: 100px; }
.min-input-wrap input { font-size: 0.85rem; }

/* ODDS */
.odds-container { display: flex; flex-direction: column; gap: 7px; }
.linha { display: flex; align-items: center; gap: 7px; animation: slideIn 0.22s ease; }
@keyframes slideIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
.linha-number { font-family: var(--mono); font-size: 0.72rem; color: var(--text-faint); width: 16px; text-align: right; flex-shrink: 0; }
.linha input { padding-left: 12px; flex: 1; }
.btn-del {
    width: 32px; height: 36px; min-width: 32px; background: transparent;
    border: 1px solid var(--border-bright); border-radius: 8px; color: var(--text-faint);
    font-size: 1rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-family: var(--display);
}
.btn-del:hover { background: var(--red-dim); border-color: var(--red); color: var(--red); }

/* BUTTONS */
button { font-family: var(--display); cursor: pointer; border: none; border-radius: 10px; font-weight: 700; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
button:hover { opacity: 0.88; }
button:active { transform: scale(0.97); }
.btn-primary { background: var(--amber); color: #0d0f14; padding: 11px 16px; font-size: 0.84rem; width: 100%; margin-top: 10px; letter-spacing: 0.02em; }
.btn-ghost { background: var(--surface-2); border: 1px solid var(--border-bright); color: var(--text-muted); padding: 9px 12px; font-size: 0.78rem; flex: 1; }
.btn-ghost:hover { border-color: var(--amber); color: var(--amber); opacity: 1; }
.btn-reset { background: transparent; border: 1px solid var(--border-bright); color: var(--red); padding: 9px 12px; font-size: 0.78rem; }
.btn-reset:hover { background: var(--red-dim); border-color: var(--red); opacity: 1; }
.action-row { display: flex; gap: 8px; }

.kbd-hint { font-family: var(--mono); font-size: 0.62rem; color: var(--text-faint); text-align: center; margin-top: 8px; }
.kbd { background: var(--surface-3); border: 1px solid var(--border-bright); border-radius: 4px; padding: 1px 5px; }

/* MAIN */
.main-area { display: flex; flex-direction: column; gap: 14px; }
.empty-state { border: 1px dashed var(--text-faint); border-radius: 14px; padding: 52px 24px; text-align: center; color: var(--text-faint); font-size: 0.85rem; }
.empty-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.35; }

/* GREEN BOX */
.box-green {
    background: var(--surface); border: 1px solid rgba(0,196,140,0.3);
    border-radius: 14px; padding: 22px; position: relative; overflow: hidden;
    animation: fadeUp 0.3s ease;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.box-green::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,196,140,0.07), transparent 70%);
    pointer-events: none;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.green-main { flex: 1; }
.green-label { font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--green); margin-bottom: 5px; }
.green-value { font-size: 2.4rem; font-weight: 800; color: var(--green); letter-spacing: -0.03em; line-height: 1; }
.green-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }
.green-roi {
    text-align: right; flex-shrink: 0;
    background: var(--green-dim); border: 1px solid rgba(0,196,140,0.2);
    border-radius: 10px; padding: 12px 16px;
}
.green-roi-label { font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); margin-bottom: 4px; }
.green-roi-value { font-family: var(--mono); font-size: 1.3rem; font-weight: 600; color: var(--green); }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; animation: fadeUp 0.35s ease 0.05s both; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.stat-label { font-family: var(--mono); font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); margin-bottom: 7px; }
.stat-value { font-family: var(--mono); font-size: 1rem; font-weight: 600; color: var(--text); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }
.stat-value.muted { color: var(--text-muted); }

/* SIMETRIA */
.simetria-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; animation: fadeUp 0.4s ease 0.08s both; }
.sim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.sim-title { font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); }
.sim-badge { font-family: var(--mono); font-size: 0.65rem; font-weight: 600; padding: 2px 8px; border-radius: 5px; }
.sim-badge.ok { background: var(--green-dim); color: var(--green); }
.sim-badge.warn { background: var(--amber-dim); color: var(--amber); }
.sim-bars { display: flex; gap: 3px; align-items: flex-end; height: 32px; }
.sim-bar { flex: 1; border-radius: 3px 3px 0 0; background: var(--red); opacity: 0.55; transition: opacity 0.2s; min-height: 3px; cursor: default; }
.sim-bar:hover { opacity: 1; }
.sim-sub { font-size: 0.72rem; color: var(--text-faint); margin-top: 8px; }

/* CARDS GRID */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; animation: fadeUp 0.4s ease 0.1s both; }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; transition: border-color 0.2s; }
.result-card:hover { border-color: var(--border-bright); }
.result-card.forced { border-color: rgba(245,166,35,0.25); }
.rc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.rc-num { font-family: var(--mono); font-size: 0.65rem; color: var(--text-faint); }
.rc-badges { display: flex; gap: 5px; align-items: center; }
.rc-odd { font-family: var(--mono); font-size: 0.75rem; background: var(--amber-dim); color: var(--amber); padding: 2px 7px; border-radius: 5px; font-weight: 600; }
.forced-badge { font-family: var(--mono); font-size: 0.6rem; background: rgba(245,166,35,0.15); color: var(--amber); padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.rc-stake-label { font-size: 0.65rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
.rc-stake-value { font-family: var(--mono); font-size: 1.5rem; font-weight: 600; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
.rc-copy-btn { width: 100%; margin-top: 10px; padding: 8px; background: var(--surface-2); border: 1px solid var(--border-bright); border-radius: 8px; color: var(--text-muted); font-size: 0.72rem; font-family: var(--display); font-weight: 600; letter-spacing: 0.03em; cursor: pointer; transition: all 0.2s; }
.rc-copy-btn:hover { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); opacity: 1; }
.rc-copy-btn.copied { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.rc-divider { height: 1px; background: var(--border); margin: 10px 0; }
.rc-meta { font-family: var(--mono); font-size: 0.68rem; color: var(--text-muted); display: flex; justify-content: space-between; }
.rc-red-value { color: var(--red); font-weight: 600; }

/* WARN / ERROR */
.warn-box { background: rgba(245,166,35,0.07); border: 1px solid rgba(245,166,35,0.2); border-radius: 10px; padding: 11px 14px; font-size: 0.8rem; color: var(--amber); display: flex; align-items: center; gap: 10px; }
.error-box { background: var(--red-dim); border: 1px solid rgba(255,77,109,0.25); border-radius: 10px; padding: 11px 14px; font-size: 0.8rem; color: var(--red); }

/* DRAWER */
.drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.drawer-backdrop.open { opacity: 1; pointer-events: all; }
.drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 340px; background: var(--surface); border-left: 1px solid var(--border-bright); z-index: 201; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
.drawer.open { transform: translateX(0); }
.drawer-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.drawer-title { font-size: 0.85rem; font-weight: 700; }
.drawer-close { background: transparent; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; padding: 0 4px; line-height: 1; }
.drawer-close:hover { color: var(--text); }
.drawer-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.hist-empty { text-align: center; color: var(--text-faint); font-size: 0.82rem; padding: 40px 20px; }
.hist-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 13px; cursor: pointer; transition: border-color 0.2s; }
.hist-item:hover { border-color: var(--amber); }
.hist-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.hist-ts { font-family: var(--mono); font-size: 0.65rem; color: var(--text-faint); }
.hist-banca { font-family: var(--mono); font-size: 0.78rem; color: var(--amber); font-weight: 600; }
.hist-odds { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.hist-odd-pill { font-family: var(--mono); font-size: 0.65rem; background: var(--surface-3); color: var(--text-muted); padding: 2px 7px; border-radius: 4px; }
.hist-green { font-family: var(--mono); font-size: 0.72rem; color: var(--green); }
.hist-del { background: transparent; border: none; color: var(--text-faint); font-size: 0.95rem; cursor: pointer; padding: 0 2px; line-height: 1; margin-left: 6px; }
.hist-del:hover { color: var(--red); }
.drawer-footer { padding: 14px; border-top: 1px solid var(--border); }
.btn-clear-hist { width: 100%; padding: 9px; background: transparent; border: 1px solid var(--border-bright); border-radius: 8px; color: var(--red); font-family: var(--display); font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-clear-hist:hover { background: var(--red-dim); border-color: var(--red); }

/* TOAST */
.toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface-3); border: 1px solid var(--border-bright);
    border-radius: 10px; padding: 12px 20px;
    font-size: 0.82rem; color: var(--text); font-family: var(--mono);
    z-index: 300; transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

@media (max-width: 840px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .box-green { flex-direction: column; align-items: flex-start; }
    .green-roi { width: 100%; text-align: left; display: flex; align-items: center; justify-content: space-between; }
    .drawer { width: 100%; }
    .header-hint { display: none; }
}
</style>

</head>

<script>
const fmt   = v => new Intl.NumberFormat('pt-BR', { style:'currency', currency:'BRL' }).format(v);
const fmtN  = v => v.toFixed(2);
const fmtPct = v => (v * 100).toFixed(1) + '%';

let lineCount = 0;
let ultimoCalculo = null;

/* ─── LINHAS ─── */
function addOdd(valor = "") {
    lineCount++;
    const idx = lineCount;
    const div = document.createElement("div");
    div.className = "linha";
    div.id = `linha-${idx}`;
    div.innerHTML = `
        <span class="linha-number"></span>
        <input type="number" step="0.01" placeholder="@0.00" value="${valor}"
               oninput="calcular()" onkeydown="onOddKeydown(event, 'linha-${idx}')">
        <button class="btn-del" title="Remover" onclick="removerLinha('linha-${idx}')">×</button>
    `;
    document.getElementById("odds-container").appendChild(div);
    renumerarLinhas();
    div.querySelector('input').focus();
}

function onOddKeydown(e, id) {
    if (e.key === 'Enter') { e.preventDefault(); addOdd(); }
}

function removerLinha(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.transition = 'all 0.18s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(-8px)';
    setTimeout(() => { el.remove(); renumerarLinhas(); calcular(); }, 190);
}

function renumerarLinhas() {
    document.querySelectorAll('.linha').forEach((el, i) => {
        const num = el.querySelector('.linha-number');
        if (num) num.textContent = i + 1;
    });
}

addOdd(); addOdd();

/* ─── CALCULAR ─── */
function calcular() {
    const inputs    = document.querySelectorAll("#odds-container input");
    const banca     = parseFloat(document.getElementById("banca").value);
    const smRaw     = parseFloat(document.getElementById("stakeMin").value);
    const stakeMin  = (!isNaN(smRaw) && smRaw > 0) ? smRaw : 1;
    const res       = document.getElementById("resultado");

    const odds = [];
    inputs.forEach(i => { if (i.value) odds.push(parseFloat(i.value)); });

    if (!banca || odds.length === 0) {
        res.innerHTML = `<div class="empty-state"><div class="empty-icon">◈</div><div>Insira a responsabilidade e as odds para calcular.</div></div>`;
        ultimoCalculo = null; return;
    }
    if (odds.some(o => isNaN(o) || o <= 1)) {
        res.innerHTML = `<div class="error-box">⚠ Odds inválidas — todas devem ser maiores que 1.00.</div>`;
        ultimoCalculo = null; return;
    }

    const n = odds.length;
    const stakes   = new Array(n).fill(0);
    const resps    = new Array(n).fill(0);
    const forcadas = new Array(n).fill(false);
    const respBase = banca / n;

    for (let i = 0; i < n; i++) {
        let stake = respBase / (odds[i] - 1);
        if (stake < stakeMin) { stake = stakeMin; forcadas[i] = true; }
        stakes[i] = stake;
        resps[i]  = stake * (odds[i] - 1);
    }

    const usada    = resps.reduce((a,b) => a+b, 0);
    const restante = banca - usada;
    const validos  = [];
    for (let i = 0; i < n; i++) { if (!forcadas[i]) validos.push(i); }
    if (validos.length > 0 && restante > 0) {
        const extra = restante / validos.length;
        validos.forEach(i => { resps[i] += extra; stakes[i] = resps[i] / (odds[i] - 1); });
    }

    const somaStakes = stakes.reduce((a,b) => a + (isNaN(b)?0:b), 0);
    const lucroGreen = somaStakes;
    const saldosRed  = stakes.map((s,i) => somaStakes - s - resps[i]);
    const piorRed    = Math.min(...saldosRed);
    const melhorRed  = Math.max(...saldosRed);
    const somaResp   = resps.reduce((a,b) => a+b, 0);
    const temForcada = forcadas.some(Boolean);
    const roi        = somaResp > 0 ? lucroGreen / somaResp : 0;
    const riskPct    = banca > 0 ? Math.abs(piorRed) / banca : 0;

    // simetria via desvio padrão
    const mediaRed = saldosRed.reduce((a,b)=>a+b,0) / saldosRed.length;
    const desvio   = Math.sqrt(saldosRed.reduce((a,b) => a + Math.pow(b - mediaRed, 2), 0) / saldosRed.length);
    const simetrico = desvio < 0.05;

    ultimoCalculo = { banca, odds:[...odds], stakes:[...stakes], lucroGreen, somaResp, piorRed };

    // barras de simetria
    const maxAbs  = Math.max(...saldosRed.map(v => Math.abs(v)));
    const simBars = saldosRed.map((v, i) => {
        const h = maxAbs > 0 ? Math.round((Math.abs(v) / maxAbs) * 28) : 4;
        return `<div class="sim-bar" style="height:${h}px" title="Linha ${i+1}: ${fmt(v)}"></div>`;
    }).join('');

    const cardsHtml = stakes.map((s,i) => `
        <div class="result-card ${forcadas[i] ? 'forced' : ''}">
            <div class="rc-header">
                <div class="rc-num">LINHA ${i+1}</div>
                <div class="rc-badges">
                    <span class="rc-odd">@${odds[i]}</span>
                    ${forcadas[i] ? '<span class="forced-badge">MIN</span>' : ''}
                </div>
            </div>
            <div class="rc-stake-label">Stake</div>
            <div class="rc-stake-value" id="stake-${i}">${fmtN(s)}</div>
            <button class="rc-copy-btn" id="cbtn-${i}" onclick="copiar(${i})">Copiar stake</button>
            <div class="rc-divider"></div>
            <div class="rc-meta">
                <span style="color:var(--text-faint)">Resp: <strong style="color:var(--text-muted)">${fmt(resps[i])}</strong></span>
                <span>RED: <span class="rc-red-value">${fmt(saldosRed[i])}</span></span>
            </div>
        </div>
    `).join('');

    res.innerHTML = `
        <div class="box-green">
            <div class="green-main">
                <div class="green-label">✦ Lucro se GREEN</div>
                <div class="green-value">+${fmt(lucroGreen)}</div>
                <div class="green-sub">Nenhum Lay bate → você recolhe todas as stakes</div>
            </div>
            <div class="green-roi">
                <div class="green-roi-label">ROI sobre resp.</div>
                <div class="green-roi-value">${fmtPct(roi)}</div>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Resp. Total</div>
                <div class="stat-value amber">${fmt(somaResp)}</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Pior RED</div>
                <div class="stat-value red">${fmt(piorRed)}</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Melhor RED</div>
                <div class="stat-value red">${fmt(melhorRed)}</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Risco / Banca</div>
                <div class="stat-value muted">${fmtPct(riskPct)}</div>
            </div>
        </div>

        <div class="simetria-wrap">
            <div class="sim-header">
                <span class="sim-title">Distribuição do RED por linha</span>
                <span class="sim-badge ${simetrico ? 'ok' : 'warn'}">${simetrico ? '✓ Simétrico' : '~ Assimétrico'}</span>
            </div>
            <div class="sim-bars">${simBars}</div>
            <div class="sim-sub">${simetrico
                ? 'RED distribuído uniformemente entre todas as linhas.'
                : 'Variação no RED entre as linhas' + (temForcada ? ' (stake mínima aplicada).' : '.')
            }</div>
        </div>

        <div class="cards-grid">${cardsHtml}</div>

        ${temForcada ? `<div class="warn-box">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Stake mínima (${fmtN(stakeMin)}) aplicada — RED assimétrico.
        </div>` : ''}
    `;
}

/* ─── COPIAR ─── */
function copiar(i) {
    const valor = document.getElementById(`stake-${i}`).innerText;
    const btn   = document.getElementById(`cbtn-${i}`);
    navigator.clipboard.writeText(valor).then(() => {
        btn.textContent = "✓ Copiado";
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = "Copiar stake"; btn.classList.remove('copied'); }, 1600);
    });
}

/* ─── EXPORTAR TEXTO ─── */
function exportarTexto() {
    if (!ultimoCalculo) { showToast("⚠ Nada calculado ainda."); return; }
    const { banca, odds, stakes, lucroGreen, somaResp, piorRed } = ultimoCalculo;
    const linhas = odds.map((o,i) => `  Linha ${i+1} (@${o}): ${fmtN(stakes[i])}`).join('\n');
    const texto = `📊 Multi LAY Pro\n━━━━━━━━━━━━━━━\nResponsabilidade: ${fmt(banca)}\n${linhas}\n━━━━━━━━━━━━━━━\n✅ GREEN: +${fmt(lucroGreen)}\n❌ Pior RED: ${fmt(piorRed)}\n📈 ROI: ${(lucroGreen/somaResp*100).toFixed(1)}%`;
    navigator.clipboard.writeText(texto).then(() => showToast("✓ Resumo copiado para a área de transferência"));
}

/* ─── HISTÓRICO ─── */
function salvarHistorico() {
    if (!ultimoCalculo) { showToast("⚠ Nada calculado para salvar."); return; }
    const hist  = carregarHist();
    const entry = { id: Date.now(), ts: new Date().toLocaleString('pt-BR'), ...ultimoCalculo };
    hist.unshift(entry);
    if (hist.length > 20) hist.length = 20;
    localStorage.setItem('multilay_hist', JSON.stringify(hist));
    showToast("✓ Cenário salvo");
}

function carregarHist() {
    try { return JSON.parse(localStorage.getItem('multilay_hist') || '[]'); } catch { return []; }
}

function abrirHistorico()  { renderHistorico(); document.getElementById('backdrop').classList.add('open'); document.getElementById('drawer').classList.add('open'); }
function fecharHistorico() { document.getElementById('backdrop').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }

function renderHistorico() {
    const hist = carregarHist();
    const body = document.getElementById('drawer-body');
    if (!hist.length) { body.innerHTML = `<div class="hist-empty">Nenhum cenário salvo ainda.<br>Calcule e clique em "Salvar".</div>`; return; }
    body.innerHTML = hist.map(e => `
        <div class="hist-item" onclick="carregarCenario(${e.id})">
            <div class="hist-item-header">
                <span class="hist-ts">${e.ts}</span>
                <div style="display:flex;align-items:center">
                    <span class="hist-banca">${fmt(e.banca)}</span>
                    <button class="hist-del" onclick="deletarHist(event,${e.id})" title="Remover">×</button>
                </div>
            </div>
            <div class="hist-odds">${e.odds.map(o=>`<span class="hist-odd-pill">@${o}</span>`).join('')}</div>
            <div class="hist-green">✦ GREEN: +${fmt(e.lucroGreen)}</div>
        </div>
    `).join('');
}

function carregarCenario(id) {
    const entry = carregarHist().find(e => e.id === id);
    if (!entry) return;
    document.getElementById("banca").value = entry.banca;
    document.getElementById("odds-container").innerHTML = "";
    lineCount = 0;
    entry.odds.forEach(o => addOdd(o));
    calcular(); fecharHistorico();
}

function deletarHist(e, id) {
    e.stopPropagation();
    const hist = carregarHist().filter(x => x.id !== id);
    localStorage.setItem('multilay_hist', JSON.stringify(hist));
    renderHistorico();
}

function limparHistorico() {
    if (!confirm("Limpar todo o histórico?")) return;
    localStorage.removeItem('multilay_hist');
    renderHistorico();
}

/* ─── RESET ─── */
function resetar() {
    document.getElementById("odds-container").innerHTML = "";
    document.getElementById("banca").value = "";
    lineCount = 0; ultimoCalculo = null;
    addOdd(); addOdd(); calcular();
}

/* ─── TOAST ─── */
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharHistorico(); });
</script>
