<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Multi LAY Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface-2: #1a1e2a;
    --surface-3: #21263a;
    --amber: #f5a623;
    --amber-dim: rgba(245, 166, 35, 0.12);
    --amber-glow: rgba(245, 166, 35, 0.25);
    --green: #00c48c;
    --green-dim: rgba(0, 196, 140, 0.12);
    --red: #ff4d6d;
    --red-dim: rgba(255, 77, 109, 0.12);
    --blue: #4d9fff;
    --text: #e8ecf4;
    --text-muted: #6b7591;
    --text-faint: #3d4460;
    --border: rgba(255,255,255,0.06);
    --border-bright: rgba(255,255,255,0.12);
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: 
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245,166,35,0.07) 0%, transparent 70%);
}

/* HEADER */
.header {
    padding: 28px 32px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(16px);
    z-index: 100;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-icon {
    width: 36px;
    height: 36px;
    background: var(--amber);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}

.logo-text {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
}

.logo-text span {
    color: var(--amber);
}

.header-hint {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

/* LAYOUT */
.container {
    max-width: 1140px;
    margin: auto;
    padding: 32px 24px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
}

/* SIDEBAR */
.sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: sticky;
    top: 96px;
}

/* SECTION LABELS */
.section-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    margin-bottom: 10px;
}

/* CARDS */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
}

.card-title {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
}

/* BANCA INPUT */
.banca-wrap {
    position: relative;
}

.banca-prefix {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--amber);
    font-weight: 600;
    pointer-events: none;
}

input[type="number"] {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border-bright);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 500;
    padding: 12px 14px 12px 38px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -moz-appearance: textfield;
    appearance: textfield;
}

input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type="number"]:focus {
    border-color: var(--amber);
    background: var(--surface-3);
    box-shadow: 0 0 0 3px var(--amber-dim);
}

input[type="number"]::placeholder {
    color: var(--text-faint);
    font-size: 0.85rem;
}

/* ODDS LIST */
.odds-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.linha {
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.25s ease;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
}

.linha-number {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-faint);
    width: 18px;
    text-align: right;
    flex-shrink: 0;
}

.linha input {
    padding-left: 14px;
    flex: 1;
}

.btn-del {
    width: 34px;
    height: 38px;
    min-width: 34px;
    background: transparent;
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    color: var(--text-faint);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.btn-del:hover {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
    transform: none;
}

/* BUTTONS */
button {
    font-family: var(--display);
    cursor: pointer;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

button:hover { opacity: 0.88; }
button:active { transform: scale(0.97); }

.btn-primary {
    background: var(--amber);
    color: #0d0f14;
    padding: 11px 16px;
    font-size: 0.85rem;
    width: 100%;
    margin-top: 12px;
    letter-spacing: 0.02em;
}

.btn-ghost {
    background: var(--surface-2);
    border: 1px solid var(--border-bright);
    color: var(--text-muted);
    padding: 9px 14px;
    font-size: 0.8rem;
    flex: 1;
}

.btn-ghost:hover {
    border-color: var(--amber);
    color: var(--amber);
    opacity: 1;
}

.btn-reset {
    background: transparent;
    border: 1px solid var(--border-bright);
    color: var(--red);
    padding: 9px 14px;
    font-size: 0.8rem;
}

.btn-reset:hover {
    background: var(--red-dim);
    border-color: var(--red);
    opacity: 1;
}

.action-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
}

/* MAIN AREA */
.main-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* EMPTY STATE */
.empty-state {
    border: 1px dashed var(--text-faint);
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
    color: var(--text-faint);
    font-size: 0.88rem;
}

.empty-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    opacity: 0.4;
}

/* RESULTADO GREEN */
.box-green {
    background: var(--surface);
    border: 1px solid rgba(0,196,140,0.3);
    border-radius: 14px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.35s ease;
}

.box-green::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,196,140,0.08), transparent 70%);
    pointer-events: none;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.green-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--green);
    margin-bottom: 6px;
}

.green-value {
    font-size: 2.6rem;
    font-weight: 800;
    color: var(--green);
    letter-spacing: -0.03em;
    line-height: 1;
}

.green-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 8px;
}

/* STATS ROW */
.stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    animation: fadeUp 0.4s ease 0.05s both;
}

.stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
}

.stat-label {
    font-family: var(--mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    margin-bottom: 8px;
}

.stat-value {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
}

.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }

/* CARDS GRID */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    animation: fadeUp 0.45s ease 0.1s both;
}

.result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.result-card:hover {
    border-color: var(--border-bright);
}

.result-card.forced {
    border-color: rgba(245, 166, 35, 0.3);
}

.rc-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
}

.rc-num {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-faint);
}

.rc-odd {
    font-family: var(--mono);
    font-size: 0.78rem;
    background: var(--amber-dim);
    color: var(--amber);
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
}

.forced-badge {
    font-family: var(--mono);
    font-size: 0.62rem;
    background: rgba(245,166,35,0.15);
    color: var(--amber);
    padding: 2px 7px;
    border-radius: 5px;
    font-weight: 600;
    letter-spacing: 0.05em;
}

.rc-stake-label {
    font-size: 0.7rem;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
}

.rc-stake-value {
    font-family: var(--mono);
    font-size: 1.45rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
}

.rc-copy-btn {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.75rem;
    font-family: var(--display);
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all 0.2s;
}

.rc-copy-btn:hover {
    background: var(--amber-dim);
    border-color: var(--amber);
    color: var(--amber);
    opacity: 1;
}

.rc-copy-btn.copied {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
}

.rc-divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
}

.rc-meta {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
}

.rc-red-label { color: var(--text-faint); }
.rc-red-value { color: var(--red); font-weight: 600; }

/* WARNING */
.warn-box {
    background: rgba(245,166,35,0.07);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 10px;
}

.error-box {
    background: var(--red-dim);
    border: 1px solid rgba(255,77,109,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--red);
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

/* RESPONSIVE */
@media (max-width: 820px) {
    .container {
        grid-template-columns: 1fr;
    }
    .sidebar {
        position: static;
    }
    .stats-row {
        grid-template-columns: 1fr 1fr;
    }
    .header {
        padding: 20px;
    }
}
</style>

</head>

<body>

<header class="header">
    <div class="logo">
        <div class="logo-icon">◈</div>
        <div class="logo-text">Multi<span>LAY</span> Pro</div>
    </div>
    <div class="header-hint">Lay Dutching Calculator</div>
</header>

<div class="container">

```
<!-- SIDEBAR -->
<aside class="sidebar">

    <div class="card">
        <div class="card-title">Responsabilidade</div>
        <div class="banca-wrap">
            <span class="banca-prefix">R$</span>
            <input type="number" id="banca" placeholder="0.00" step="0.01">
        </div>
    </div>

    <div class="card">
        <div class="card-title">Odds Lay</div>
        <div class="odds-container" id="odds-container"></div>
        <button class="btn-primary" onclick="addOdd()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Adicionar Linha
        </button>
    </div>

    <div class="action-row">
        <button class="btn-ghost" onclick="copiarTudo()" id="btn-copiar-tudo">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copiar Tudo
        </button>
        <button class="btn-reset" onclick="resetar()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
            Reset
        </button>
    </div>

</aside>

<!-- MAIN -->
<main class="main-area" id="resultado">
    <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div>Insira a responsabilidade e as odds para calcular.</div>
    </div>
</main>
```

</div>

<script>
const fmt = (v) => new Intl.NumberFormat('pt-BR', { style:'currency', currency:'BRL' }).format(v);
const fmtN = (v) => v.toFixed(2);

let lineCount = 0;

function addOdd(valor = "") {
    lineCount++;
    const idx = lineCount;
    const div = document.createElement("div");
    div.className = "linha";
    div.id = `linha-${idx}`;

    div.innerHTML = `
        <span class="linha-number">${document.querySelectorAll('.linha').length + 1}</span>
        <input type="number" step="0.01" placeholder="@0.00" value="${valor}" oninput="calcular()">
        <button class="btn-del" title="Remover" onclick="removerLinha('linha-${idx}')">×</button>
    `;

    document.getElementById("odds-container").appendChild(div);
    renumerarLinhas();
}

function removerLinha(id) {
    const el = document.getElementById(id);
    if (el) {
        el.style.animation = 'none';
        el.style.opacity = '0';
        el.style.transform = 'translateX(-8px)';
        el.style.transition = 'all 0.2s';
        setTimeout(() => { el.remove(); renumerarLinhas(); calcular(); }, 200);
    }
}

function renumerarLinhas() {
    document.querySelectorAll('.linha').forEach((el, i) => {
        const num = el.querySelector('.linha-number');
        if (num) num.textContent = i + 1;
    });
}

addOdd();
addOdd();

document.getElementById("banca").oninput = calcular;

function calcular() {
    const inputs = document.querySelectorAll("#odds-container input");
    const banca = parseFloat(document.getElementById("banca").value);
    const res = document.getElementById("resultado");

    const odds = [];
    inputs.forEach(i => { if (i.value) odds.push(parseFloat(i.value)); });

    if (!banca || odds.length === 0) {
        res.innerHTML = `<div class="empty-state"><div class="empty-icon">◈</div><div>Insira a responsabilidade e as odds para calcular.</div></div>`;
        return;
    }

    if (odds.some(o => o <= 1)) {
        res.innerHTML = `<div class="error-box">⚠️ Existem odds inválidas (menores ou iguais a 1.00).</div>`;
        return;
    }

    const n = odds.length;
    const stakes = new Array(n).fill(0);
    const resps = new Array(n).fill(0);
    const forcadas = new Array(n).fill(false);
    const respBase = banca / n;

    for (let i = 0; i < n; i++) {
        let stake = respBase / (odds[i] - 1);
        if (stake < 1) { stake = 1; forcadas[i] = true; }
        stakes[i] = stake;
        resps[i] = stake * (odds[i] - 1);
    }

    const usada = resps.reduce((a,b) => a+b, 0);
    const restante = banca - usada;
    const validos = [];
    for (let i = 0; i < n; i++) { if (!forcadas[i]) validos.push(i); }

    if (validos.length > 0 && restante > 0) {
        const extra = restante / validos.length;
        validos.forEach(i => { resps[i] += extra; stakes[i] = resps[i] / (odds[i] - 1); });
    }

    const somaStakes = stakes.reduce((a,b) => a + (isNaN(b) ? 0 : b), 0);
    const lucroGreen = somaStakes;
    const saldosRed = stakes.map((s, i) => somaStakes - s - resps[i]);
    const piorRed = Math.min(...saldosRed);
    const melhorRed = Math.max(...saldosRed);
    const somaResp = resps.reduce((a,b) => a+b, 0);
    const temForcada = forcadas.some(Boolean);

    // Build HTML
    let cardsHtml = stakes.map((s, i) => `
        <div class="result-card ${forcadas[i] ? 'forced' : ''}">
            <div class="rc-header">
                <div>
                    <div class="rc-num">LINHA ${i+1}</div>
                </div>
                <div style="display:flex;gap:6px;align-items:center;">
                    <span class="rc-odd">@${odds[i]}</span>
                    ${forcadas[i] ? '<span class="forced-badge">MIN</span>' : ''}
                </div>
            </div>
            <div class="rc-stake-label">Stake</div>
            <div class="rc-stake-value" id="stake-${i}">${fmtN(s)}</div>
            <button class="rc-copy-btn" id="cbtn-${i}" onclick="copiar(${i})">Copiar</button>
            <div class="rc-divider"></div>
            <div class="rc-meta">
                <span class="rc-red-label">Resp: <strong style="color:var(--text-muted)">${fmt(resps[i])}</strong></span>
                <span><span class="rc-red-label">RED: </span><span class="rc-red-value">${fmt(saldosRed[i])}</span></span>
            </div>
        </div>
    `).join('');

    res.innerHTML = `
        <div class="box-green">
            <div class="green-label">✦ Lucro se GREEN</div>
            <div class="green-value">+${fmt(lucroGreen)}</div>
            <div class="green-sub">Nenhum Lay bate → você recolhe todas as stakes</div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Resp. Total</div>
                <div class="stat-value amber">${fmt(somaResp)}</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Pior RED</div>
                <div class="stat-value red">${fmt(piorRed)}</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Melhor RED</div>
                <div class="stat-value red">${fmt(melhorRed)}</div>
            </div>
        </div>

        <div class="cards-grid">${cardsHtml}</div>

        ${temForcada ? `<div class="warn-box">⚠ Stake mínima (1.00) aplicada em uma ou mais linhas — a distribuição de RED não será perfeitamente simétrica.</div>` : ''}
    `;
}

function copiar(i) {
    const valor = document.getElementById(`stake-${i}`).innerText;
    const btn = document.getElementById(`cbtn-${i}`);
    navigator.clipboard.writeText(valor).then(() => {
        btn.textContent = "✓ Copiado";
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = "Copiar";
            btn.classList.remove('copied');
        }, 1600);
    });
}

function copiarTudo() {
    const arr = [];
    document.querySelectorAll("[id^='stake-']").forEach(e => arr.push(e.innerText));
    if (!arr.length) return;
    navigator.clipboard.writeText(arr.join(" | ")).then(() => {
        const btn = document.getElementById("btn-copiar-tudo");
        const orig = btn.innerHTML;
        btn.innerHTML = '✓ Copiado!';
        btn.style.borderColor = 'var(--green)';
        btn.style.color = 'var(--green)';
        setTimeout(() => {
            btn.innerHTML = orig;
            btn.style.borderColor = '';
            btn.style.color = '';
        }, 2000);
    });
}

function resetar() {
    document.getElementById("odds-container").innerHTML = "";
    document.getElementById("banca").value = "";
    lineCount = 0;
    addOdd();
    addOdd();
    calcular();
}
</script>
