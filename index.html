<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Multi LAY Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="data:application/json,{}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --bg:#0d0f14; --surface:#13161e; --surface-2:#1a1e2a; --surface-3:#21263a;
  --amber:#f5a623; --amber-dim:rgba(245,166,35,.12); --amber-glow:rgba(245,166,35,.25);
  --green:#00c48c; --green-dim:rgba(0,196,140,.12);
  --red:#ff4d6d; --red-dim:rgba(255,77,109,.12);
  --blue:#4d9fff; --blue-dim:rgba(77,159,255,.12);
  --text:#e8ecf4; --text-muted:#6b7591; --text-faint:#3d4460;
  --border:rgba(255,255,255,.06); --border-bright:rgba(255,255,255,.12);
  --mono:'JetBrains Mono',monospace; --display:'Syne',sans-serif;
  --radius:14px; --transition:.2s;
}
[data-theme="light"] {
  --bg:#f0f2f7; --surface:#ffffff; --surface-2:#f4f6fa; --surface-3:#e8ecf4;
  --text:#1a1f2e; --text-muted:#5a6480; --text-faint:#9aa0b8;
  --border:rgba(0,0,0,.07); --border-bright:rgba(0,0,0,.13);
}

/* ══════════════════════════════════════════
RESET & BASE
══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--display);background:var(--bg);color:var(--text);min-height:100vh;
background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(245,166,35,.07) 0%,transparent 70%);
transition:background var(--transition),color var(--transition)}

/* ══════════════════════════════════════════
HEADER
══════════════════════════════════════════ */
.header{
padding:18px 28px;border-bottom:1px solid var(--border);
display:flex;align-items:center;justify-content:space-between;
position:sticky;top:0;background:rgba(13,15,20,.92);backdrop-filter:blur(16px);z-index:100;
transition:background var(--transition);
}
[data-theme="light"] .header{background:rgba(240,242,247,.94)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--amber);border-radius:8px;
display:flex;align-items:center;justify-content:center;font-size:14px;color:#0d0f14;font-weight:bold}
.logo-text{font-size:1rem;font-weight:800;letter-spacing:-.02em}
.logo-text span{color:var(--amber)}
.header-right{display:flex;align-items:center;gap:8px}
.header-hint{font-family:var(--mono);font-size:.65rem;color:var(--text-faint);letter-spacing:.1em;text-transform:uppercase}

/* icon buttons in header */
.hbtn{
font-family:var(--display);background:var(--surface-2);border:1px solid var(--border-bright);
color:var(--text-muted);padding:7px 11px;border-radius:8px;font-size:.74rem;font-weight:600;
cursor:pointer;display:flex;align-items:center;gap:5px;transition:all var(--transition);white-space:nowrap;
}
.hbtn:hover{border-color:var(--amber);color:var(--amber);opacity:1}
.hbtn.active{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}

/* ══════════════════════════════════════════
LAYOUT
══════════════════════════════════════════ */
.container{max-width:1180px;margin:auto;padding:24px;display:grid;grid-template-columns:350px 1fr;gap:20px;align-items:start}
.sidebar{display:flex;flex-direction:column;gap:12px;position:sticky;top:82px}
.main-area{display:flex;flex-direction:column;gap:12px}

/* ══════════════════════════════════════════
CARDS
══════════════════════════════════════════ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:background var(--transition),border-color var(--transition)}
.card-title{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:12px}

/* ══════════════════════════════════════════
INPUTS
══════════════════════════════════════════ */
.input-wrap{position:relative}
.input-prefix{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:.78rem;color:var(--amber);font-weight:600;pointer-events:none}
.input-suffix{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:.72rem;color:var(--text-faint);pointer-events:none}
input[type="number"],input[type="text"]{
width:100%;background:var(--surface-2);border:1px solid var(--border-bright);
border-radius:10px;color:var(--text);font-family:var(--mono);font-size:.92rem;font-weight:500;
padding:10px 12px 10px 34px;outline:none;
transition:border-color var(--transition),box-shadow var(--transition),background var(--transition);
-moz-appearance:textfield;appearance:textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input:focus{border-color:var(--amber);background:var(--surface-3);box-shadow:0 0 0 3px var(--amber-dim)}
input::placeholder{color:var(--text-faint);font-size:.8rem}
input.no-prefix{padding-left:12px}
input[type="text"].no-prefix{padding-left:12px}

/* ══════════════════════════════════════════
TOGGLE ROWS  (comissão, stake min, tema...)
══════════════════════════════════════════ */
.config-row{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.config-label{font-size:.72rem;color:var(--text-muted)}
.config-input{width:90px}
.config-input input{font-size:.84rem}

/* toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{width:36px;height:20px;background:var(--surface-3);border-radius:10px;position:relative;cursor:pointer;border:none;flex-shrink:0;transition:background var(--transition)}
.toggle.on{background:var(--amber)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:7px;background:#fff;transition:left var(--transition)}
.toggle.on::after{left:19px}

/* ══════════════════════════════════════════
ODDS LIST
══════════════════════════════════════════ */
.odds-container{display:flex;flex-direction:column;gap:6px}
.linha{display:flex;align-items:center;gap:6px;animation:slideIn .22s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.linha-number{font-family:var(--mono);font-size:.7rem;color:var(--text-faint);width:15px;text-align:right;flex-shrink:0}
.linha input{padding-left:12px;flex:1}

/* stake-fixa indicator */
.linha.fixa-ativa input{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}

.btn-del{width:30px;height:34px;min-width:30px;background:transparent;border:1px solid var(--border-bright);
border-radius:8px;color:var(--text-faint);font-size:.95rem;cursor:pointer;transition:all var(--transition);
display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--display)}
.btn-del:hover{background:var(--red-dim);border-color:var(--red);color:var(--red)}

/* importar odds */
.import-row{margin-top:8px}
.import-input-wrap{display:flex;gap:6px;margin-top:5px}
.import-input-wrap input{flex:1;font-size:.8rem}
.btn-import{padding:8px 12px;background:var(--blue-dim);border:1px solid rgba(77,159,255,.25);color:var(--blue);
font-size:.74rem;font-family:var(--display);font-weight:700;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all var(--transition)}
.btn-import:hover{background:var(--blue);color:#fff;opacity:1}

/* ══════════════════════════════════════════
BUTTONS
══════════════════════════════════════════ */
button{font-family:var(--display);cursor:pointer;border:none;border-radius:10px;font-weight:700;transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:5px}
button:hover{opacity:.88}
button:active{transform:scale(.97)}
.btn-primary{background:var(--amber);color:#0d0f14;padding:10px 16px;font-size:.83rem;width:100%;margin-top:9px;letter-spacing:.02em}
.btn-ghost{background:var(--surface-2);border:1px solid var(--border-bright);color:var(--text-muted);padding:8px 11px;font-size:.76rem;flex:1}
.btn-ghost:hover{border-color:var(--amber);color:var(--amber);opacity:1}
.btn-reset{background:transparent;border:1px solid var(--border-bright);color:var(--red);padding:8px 11px;font-size:.76rem}
.btn-reset:hover{background:var(--red-dim);border-color:var(--red);opacity:1}
.action-row{display:flex;gap:7px}

.kbd-hint{font-family:var(--mono);font-size:.6rem;color:var(--text-faint);text-align:center;margin-top:7px}
.kbd{background:var(--surface-3);border:1px solid var(--border-bright);border-radius:4px;padding:1px 5px}

/* ══════════════════════════════════════════
EMPTY / ERROR
══════════════════════════════════════════ */
.empty-state{border:1px dashed var(--text-faint);border-radius:var(--radius);padding:52px 24px;text-align:center;color:var(--text-faint);font-size:.84rem}
.empty-icon{font-size:1.8rem;margin-bottom:10px;opacity:.3}
.error-box{background:var(--red-dim);border:1px solid rgba(255,77,109,.25);border-radius:10px;padding:11px 14px;font-size:.8rem;color:var(--red)}
.warn-box{background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.2);border-radius:10px;padding:11px 14px;font-size:.79rem;color:var(--amber);display:flex;align-items:center;gap:9px}

/* ══════════════════════════════════════════
GREEN BOX
══════════════════════════════════════════ */
.box-green{
background:var(--surface);border:1px solid rgba(0,196,140,.3);border-radius:var(--radius);
padding:20px;position:relative;overflow:hidden;animation:fadeUp .3s ease;
display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.box-green::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,196,140,.07),transparent 70%);pointer-events:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.green-main{flex:1}
.green-label{font-family:var(--mono);font-size:.66rem;text-transform:uppercase;letter-spacing:.14em;color:var(--green);margin-bottom:4px}
.green-value{font-size:2.2rem;font-weight:800;color:var(--green);letter-spacing:-.03em;line-height:1}
.green-sub{font-size:.73rem;color:var(--text-muted);margin-top:5px}
.green-pills{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.green-pill{background:var(--green-dim);border:1px solid rgba(0,196,140,.2);border-radius:10px;padding:10px 14px;text-align:center}
.green-pill-label{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:3px}
.green-pill-value{font-family:var(--mono);font-size:1.1rem;font-weight:600;color:var(--green)}

/* comissão: pill com cor diferente quando ativa */
.pill-comissao .green-pill-value{color:var(--amber)}
.pill-comissao{border-color:rgba(245,166,35,.2);background:var(--amber-dim)}

/* ══════════════════════════════════════════
STATS ROW
══════════════════════════════════════════ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;animation:fadeUp .35s ease .05s both}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px}
.stat-label{font-family:var(--mono);font-size:.61rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:6px}
.stat-value{font-family:var(--mono);font-size:.95rem;font-weight:600;color:var(--text)}
.stat-value.red{color:var(--red)}.stat-value.amber{color:var(--amber)}.stat-value.muted{color:var(--text-muted)}.stat-value.green{color:var(--green)}

/* ══════════════════════════════════════════
SIMULADOR
══════════════════════════════════════════ */
.sim-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;animation:fadeUp .4s ease .07s both}
.sim-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sim-title-text{font-family:var(--mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint)}
.sim-badge{font-family:var(--mono);font-size:.64rem;font-weight:600;padding:2px 8px;border-radius:5px}
.sim-badge.ok{background:var(--green-dim);color:var(--green)}
.sim-badge.warn{background:var(--amber-dim);color:var(--amber)}
.sim-bars-wrap{display:flex;gap:3px;align-items:flex-end;height:30px}
.sim-bar{flex:1;border-radius:3px 3px 0 0;background:var(--red);opacity:.55;transition:height .4s ease,opacity var(--transition);min-height:3px;cursor:default}
.sim-bar:hover{opacity:1}
.sim-sub{font-size:.7rem;color:var(--text-faint);margin-top:7px}

/* SLIDER SIMULADOR DE ODD */
.slider-section{background:var(--surface);border:1px solid var(--border-bright);border-radius:12px;padding:14px 16px;animation:fadeUp .42s ease .09s both}
.slider-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.slider-title{font-family:var(--mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint)}
.slider-valor{font-family:var(--mono);font-size:.8rem;color:var(--amber);font-weight:600}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.slider-linha-label{font-family:var(--mono);font-size:.7rem;color:var(--text-muted);min-width:60px}
input[type="range"]{
flex:1;height:4px;border-radius:2px;background:var(--surface-3);
-webkit-appearance:none;appearance:none;outline:none;padding:0;cursor:pointer;border:none;box-shadow:none;
}
input[type="range"]:focus{box-shadow:none;border:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:8px;background:var(--amber);cursor:pointer;border:none}
input[type="range"]::-moz-range-thumb{width:16px;height:16px;border-radius:8px;background:var(--amber);cursor:pointer;border:none}
.slider-resultado{font-family:var(--mono);font-size:.72rem;color:var(--text-muted)}
.slider-resultado strong{color:var(--green)}
.slider-resultado .red{color:var(--red)}

/* ══════════════════════════════════════════
MODO COMPACTO — cards grid
══════════════════════════════════════════ */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px;animation:fadeUp .4s ease .1s both}
.cards-grid.compact .result-card{padding:10px 12px}
.cards-grid.compact .rc-stake-value{font-size:1.15rem}
.cards-grid.compact .rc-copy-btn{padding:6px;font-size:.7rem;margin-top:7px}
.cards-grid.compact .rc-divider{margin:7px 0}

.result-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;transition:border-color var(--transition)}
.result-card:hover{border-color:var(--border-bright)}
.result-card.forced{border-color:rgba(245,166,35,.25)}
.rc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}
.rc-num{font-family:var(--mono);font-size:.63rem;color:var(--text-faint)}
.rc-badges{display:flex;gap:5px;align-items:center}
.rc-odd{font-family:var(--mono);font-size:.73rem;background:var(--amber-dim);color:var(--amber);padding:2px 7px;border-radius:5px;font-weight:600}
.forced-badge{font-family:var(--mono);font-size:.59rem;background:rgba(245,166,35,.15);color:var(--amber);padding:2px 5px;border-radius:4px;font-weight:600}
.rc-stake-label{font-size:.63rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.rc-stake-value{font-family:var(--mono);font-size:1.42rem;font-weight:600;color:var(--text);letter-spacing:-.02em;line-height:1}
.rc-copy-btn{width:100%;margin-top:9px;padding:7px;background:var(--surface-2);border:1px solid var(--border-bright);border-radius:8px;color:var(--text-muted);font-size:.7rem;font-family:var(--display);font-weight:600;letter-spacing:.03em;cursor:pointer;transition:all var(--transition)}
.rc-copy-btn:hover{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);opacity:1}
.rc-copy-btn.copied{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.rc-divider{height:1px;background:var(--border);margin:9px 0}
.rc-meta{font-family:var(--mono);font-size:.67rem;color:var(--text-muted);display:flex;justify-content:space-between}
.rc-red-value{color:var(--red);font-weight:600}

/* ══════════════════════════════════════════
PAINEL DE P&L
══════════════════════════════════════════ */
.pnl-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.pnl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pnl-title{font-family:var(--mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint)}
.pnl-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pnl-stat{background:var(--surface-2);border-radius:8px;padding:10px 12px}
.pnl-stat-label{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:4px}
.pnl-stat-value{font-family:var(--mono);font-size:.95rem;font-weight:600}
.pnl-list{display:flex;flex-direction:column;gap:5px;max-height:160px;overflow-y:auto}
.pnl-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--surface-2);border-radius:7px;font-family:var(--mono);font-size:.7rem}
.pnl-item-ts{color:var(--text-faint)}
.pnl-item-result{font-weight:600}
.pnl-item-result.green{color:var(--green)}
.pnl-item-result.red{color:var(--red)}
.pnl-item-btns{display:flex;gap:4px}
.pnl-item-btn{background:transparent;border:none;cursor:pointer;font-size:.8rem;padding:0 3px;color:var(--text-faint);transition:color var(--transition)}
.pnl-item-btn:hover{color:var(--text)}
.pnl-empty{font-family:var(--mono);font-size:.72rem;color:var(--text-faint);text-align:center;padding:16px}

/* ══════════════════════════════════════════
HISTÓRICO DRAWER
══════════════════════════════════════════ */
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-backdrop.open{opacity:1;pointer-events:all}
.drawer{position:fixed;right:0;top:0;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--border-bright);z-index:201;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-header{padding:18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.drawer-title{font-size:.84rem;font-weight:700}
.drawer-close{background:transparent;border:none;color:var(--text-muted);font-size:1.3rem;cursor:pointer;padding:0 3px;line-height:1}
.drawer-close:hover{color:var(--text)}
.drawer-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.hist-empty{text-align:center;color:var(--text-faint);font-size:.8rem;padding:36px 20px}
.hist-item{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:border-color var(--transition)}
.hist-item:hover{border-color:var(--amber)}
.hist-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.hist-ts{font-family:var(--mono);font-size:.63rem;color:var(--text-faint)}
.hist-banca{font-family:var(--mono);font-size:.76rem;color:var(--amber);font-weight:600}
.hist-odds{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.hist-odd-pill{font-family:var(--mono);font-size:.63rem;background:var(--surface-3);color:var(--text-muted);padding:2px 6px;border-radius:4px}
.hist-green{font-family:var(--mono);font-size:.7rem;color:var(--green)}
.hist-del{background:transparent;border:none;color:var(--text-faint);font-size:.9rem;cursor:pointer;padding:0 2px;line-height:1;margin-left:5px}
.hist-del:hover{color:var(--red)}
.drawer-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:7px}
.btn-clear-hist{flex:1;padding:8px;background:transparent;border:1px solid var(--border-bright);border-radius:8px;color:var(--red);font-family:var(--display);font-size:.76rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
.btn-clear-hist:hover{background:var(--red-dim);border-color:var(--red)}

/* ══════════════════════════════════════════
TOAST
══════════════════════════════════════════ */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface-3);border:1px solid var(--border-bright);border-radius:10px;padding:11px 18px;font-size:.8rem;color:var(--text);font-family:var(--mono);z-index:300;transition:transform .3s ease,opacity .3s ease;opacity:0;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ══════════════════════════════════════════
SCROLLBAR
══════════════════════════════════════════ */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}

/* ══════════════════════════════════════════
RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:860px){
.container{grid-template-columns:1fr}
.sidebar{position:static}
.stats-row{grid-template-columns:1fr 1fr}
.box-green{flex-direction:column;align-items:flex-start}
.green-pills{justify-content:flex-start}
.drawer{width:100%}
.header-hint{display:none}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 15L85 50L50 85L15 50L50 15Z" stroke="#f5a623" stroke-width="4" stroke-opacity="0.3"/>
    <path d="M50 28L72 50L50 72L28 50L50 28Z" fill="#f5a623" fill-opacity="0.6"/>
    <path d="M50 41L59 50L50 59L41 50L50 41Z" fill="#0d0f14"/>
  </svg>
  </div>
  <div class="header-right">
    <span class="header-hint">Lay Dutching</span>
    <button class="hbtn" id="btn-compact" onclick="toggleCompacto()" title="Modo compacto (Alt+C)">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Compacto
    </button>
    <button class="hbtn" id="btn-theme" onclick="toggleTheme()" title="Alternar tema">
      <svg id="theme-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      Tema
    </button>
    <button class="hbtn" onclick="compartilharURL()" title="Compartilhar via URL">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Partilhar
    </button>
    <button class="hbtn" onclick="abrirHistorico()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Histórico
    </button>
  </div>
</header>

<div class="container">

  <aside class="sidebar">

    <div class="card">
      <div class="card-title">Responsabilidade Total</div>
      <div class="input-wrap">
        <span class="input-prefix">R$</span>
        <input type="number" id="banca" placeholder="0.00" step="0.01" oninput="calcular()">
      </div>

      <div class="config-row">
        <div>
          <div class="config-label">Comissão da exchange</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="toggle" id="toggle-comissao" onclick="toggleComissao()"></button>
          <div class="config-input" id="comissao-wrap" style="display:none">
            <div class="input-wrap">
              <input type="number" id="comissao" class="no-prefix" value="5" step="0.1" min="0" max="50" oninput="calcular()" placeholder="5">
              <span class="input-suffix">%</span>
            </div>
          </div>
        </div>
      </div>

      <div class="config-row">
        <span class="config-label">Stake mínima</span>
        <div class="config-input">
          <div class="input-wrap">
            <input type="number" id="stakeMin" class="no-prefix" value="1" step="0.01" min="0.01" oninput="calcular()" placeholder="1.00">
          </div>
        </div>
      </div>

      <div class="config-row">
        <div>
          <div class="config-label">Modo stake fixa</div>
        </div>
        <button class="toggle" id="toggle-fixa" onclick="toggleFixa()"></button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Odds Lay</div>
      <div class="odds-container" id="odds-container"></div>
      <button class="btn-primary" onclick="addOdd()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar Linha
      </button>
      <div class="kbd-hint">
        <span class="kbd">Enter</span> adiciona linha &nbsp;·&nbsp; <span class="kbd">Tab</span> navega &nbsp;·&nbsp; <span class="kbd">Alt+S</span> salva
      </div>

      <div class="import-row">
        <div class="card-title" style="margin-bottom:6px">Importar odds</div>
        <div class="import-input-wrap">
          <input type="text" id="import-input" class="no-prefix" placeholder="ex: 1.85 2.10 3.40" onkeydown="if(event.key==='Enter') importarOdds()">
          <button class="btn-import" onclick="importarOdds()">Importar</button>
        </div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-ghost" onclick="salvarHistorico()">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Salvar
      </button>
      <button class="btn-ghost" onclick="exportarTexto()">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Exportar
      </button>
      <button class="btn-reset" onclick="resetar()" title="Zerar tudo (Alt+R)">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
    </div>

  </aside>

  <main class="main-area" id="resultado">
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div>Insira a responsabilidade e as odds para calcular.</div>
    </div>
  </main>
</div>

<div class="drawer-backdrop" id="backdrop" onclick="fecharHistorico()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Histórico de Cálculos</span>
    <button class="drawer-close" onclick="fecharHistorico()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer">
    <button class="btn-clear-hist" onclick="limparHistorico()">Limpar histórico</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─── FORMATADORES ─── */
const fmt    = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
const fmtN   = v => (+v).toFixed(2);
const fmtPct = v => (v*100).toFixed(1)+'%';

/* ─── ESTADO ─── */
let lineCount     = 0;
let ultimoCalculo = null;
let modoCompacto  = false;
let modoFixa      = false;
let comissaoAtiva = false;

/* ══════════════════════════════════════════
   LINHAS DE ODD
══════════════════════════════════════════ */
function addOdd(valor="") {
  lineCount++;
  const idx = lineCount;
  const div = document.createElement("div");
  div.className = "linha";
  div.id = `linha-${idx}`;

  // No modo stake fixa, segunda coluna é a stake fixa opcional
  const fixaExtra = modoFixa
    ? `<input type="number" step="0.01" placeholder="stake" style="max-width:80px;padding-left:8px" title="Stake fixa para esta linha (opcional)">`
    : '';

  div.innerHTML = `
    <span class="linha-number"></span>
    <input type="number" step="0.01" placeholder="@0.00" value="${valor}"
           oninput="calcular()" onkeydown="onOddKeydown(event,'linha-${idx}')">
    ${fixaExtra}
    <button class="btn-del" title="Remover" onclick="removerLinha('linha-${idx}')">×</button>
  `;
  document.getElementById("odds-container").appendChild(div);
  renumerarLinhas();
  div.querySelectorAll('input')[0].focus();
}

function onOddKeydown(e, id) {
  if (e.key==='Enter') { e.preventDefault(); addOdd(); }
}

function removerLinha(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.transition='all .18s'; el.style.opacity='0'; el.style.transform='translateX(-8px)';
  setTimeout(() => { el.remove(); renumerarLinhas(); calcular(); }, 190);
}

function renumerarLinhas() {
  document.querySelectorAll('.linha').forEach((el,i) => {
    const n = el.querySelector('.linha-number');
    if (n) n.textContent = i+1;
  });
}

/* ══════════════════════════════════════════
   IMPORTAR ODDS POR TEXTO
══════════════════════════════════════════ */
function importarOdds() {
  const raw = document.getElementById('import-input').value.trim();
  if (!raw) return;
  // aceita separadores: espaço, vírgula, ponto-e-vírgula, pipe
  const partes = raw.split(/[\s,;|]+/).map(v => parseFloat(v.replace(',','.'))).filter(v => !isNaN(v) && v > 1);
  if (!partes.length) { showToast("⚠ Nenhuma odd válida encontrada."); return; }
  document.getElementById("odds-container").innerHTML = "";
  lineCount = 0;
  partes.forEach(o => addOdd(o));
  document.getElementById('import-input').value = '';
  calcular();
  showToast(`✓ ${partes.length} odds importadas`);
}

/* ══════════════════════════════════════════
   TOGGLES DE CONFIGURAÇÃO
══════════════════════════════════════════ */
function toggleComissao() {
  comissaoAtiva = !comissaoAtiva;
  document.getElementById('toggle-comissao').classList.toggle('on', comissaoAtiva);
  document.getElementById('comissao-wrap').style.display = comissaoAtiva ? 'block' : 'none';
  calcular();
}

function toggleFixa() {
  modoFixa = !modoFixa;
  document.getElementById('toggle-fixa').classList.toggle('on', modoFixa);
  // rebuild lines
  const oddAtual = [...document.querySelectorAll('#odds-container .linha input[type="number"]:first-of-type')].map(i=>i.value);
  document.getElementById("odds-container").innerHTML = "";
  lineCount = 0;
  oddAtual.forEach(o => addOdd(o));
  calcular();
}

function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  localStorage.setItem('multilay_theme', isLight ? 'dark' : 'light');
}

function toggleCompacto() {
  modoCompacto = !modoCompacto;
  document.getElementById('btn-compact').classList.toggle('active', modoCompacto);
  calcular();
}

/* ══════════════════════════════════════════
   COMPARTILHAR VIA URL
══════════════════════════════════════════ */
function compartilharURL() {
  if (!ultimoCalculo) { showToast("⚠ Nada calculado ainda."); return; }
  const { banca, odds } = ultimoCalculo;
  const params = new URLSearchParams();
  params.set('b', banca);
  params.set('o', odds.join(','));
  if (comissaoAtiva) params.set('c', document.getElementById('comissao').value);
  params.set('sm', document.getElementById('stakeMin').value);
  const url = `${location.origin}${location.pathname}?${params.toString()}`;
  navigator.clipboard.writeText(url).then(() => showToast("✓ URL copiada — compartilhe com quem quiser!"));
}

function carregarURL() {
  const params = new URLSearchParams(location.search);
  if (!params.has('b') || !params.has('o')) return;
  document.getElementById('banca').value = params.get('b');
  if (params.has('sm')) document.getElementById('stakeMin').value = params.get('sm');
  if (params.has('c')) {
    document.getElementById('comissao').value = params.get('c');
    if (!comissaoAtiva) toggleComissao();
  }
  const odds = params.get('o').split(',').map(Number).filter(o => o>1);
  document.getElementById("odds-container").innerHTML = "";
  lineCount = 0;
  odds.forEach(o => addOdd(o));
  calcular();
}

/* ══════════════════════════════════════════
   CALCULAR
══════════════════════════════════════════ */
function calcular() {
  const inputs   = document.querySelectorAll("#odds-container .linha");
  const banca    = parseFloat(document.getElementById("banca").value);
  const smRaw    = parseFloat(document.getElementById("stakeMin").value);
  const stakeMin = (!isNaN(smRaw) && smRaw > 0) ? smRaw : 1;
  const comPct   = comissaoAtiva ? (parseFloat(document.getElementById("comissao").value)||0)/100 : 0;
  const res      = document.getElementById("resultado");

  // coleta odds e stakes fixas
  const odds = [], stakesFix = [];
  inputs.forEach(linha => {
    const inp = linha.querySelectorAll('input[type="number"]');
    const oddVal = parseFloat(inp[0]?.value);
    if (inp[0]?.value && !isNaN(oddVal)) {
      odds.push(oddVal);
      stakesFix.push(modoFixa && inp[1]?.value ? parseFloat(inp[1].value) : null);
    }
  });

  if (!banca || odds.length === 0) {
    res.innerHTML = `<div class="empty-state"><div class="empty-icon">◈</div><div>Insira a responsabilidade e as odds para calcular.</div></div>`;
    ultimoCalculo = null; return;
  }
  if (odds.some(o => isNaN(o) || o <= 1)) {
    res.innerHTML = `<div class="error-box">⚠ Odds inválidas — todas devem ser maiores que 1.00.</div>`;
    ultimoCalculo = null; return;
  }

  const n       = odds.length;
  const stakes  = new Array(n).fill(0);
  const resps   = new Array(n).fill(0);
  const forcadas= new Array(n).fill(false);

  // Modo stake fixa: linhas com stake definida são fixas; o restante da responsabilidade vai para as outras
  if (modoFixa) {
    let bancaRestante = banca;
    let idxLivres = [];
    for (let i=0;i<n;i++) {
      if (stakesFix[i] !== null && !isNaN(stakesFix[i]) && stakesFix[i]>0) {
        stakes[i] = stakesFix[i];
        resps[i] = stakes[i] * (odds[i]-1);
        bancaRestante -= resps[i];
        forcadas[i] = true; // marca como "fixa" (usaremos para badge diferente)
      } else {
        idxLivres.push(i);
      }
    }
    const respBase = idxLivres.length > 0 ? bancaRestante / idxLivres.length : 0;
    for (const i of idxLivres) {
      let stake = respBase / (odds[i]-1);
      if (stake < stakeMin) { stake = stakeMin; }
      stakes[i] = stake;
      resps[i] = stake * (odds[i]-1);
    }
  } else {
    // Modo normal
    const respBase = banca / n;
    for (let i=0;i<n;i++) {
      let stake = respBase/(odds[i]-1);
      if (stake < stakeMin) { stake = stakeMin; forcadas[i] = true; }
      stakes[i] = stake; resps[i] = stake*(odds[i]-1);
    }
    // redistribuição
    const usada = resps.reduce((a,b)=>a+b,0);
    const restante = banca - usada;
    const validos = []; for(let i=0;i<n;i++){if(!forcadas[i])validos.push(i);}
    if (validos.length>0 && restante>0) {
      const extra = restante/validos.length;
      validos.forEach(i=>{resps[i]+=extra; stakes[i]=resps[i]/(odds[i]-1);});
    }
  }

  const somaStakes  = stakes.reduce((a,b)=>a+(isNaN(b)?0:b),0);
  const somaResp    = resps.reduce((a,b)=>a+b,0);

  // Lucro GREEN bruto = soma das stakes; líquido = aplicar comissão
  const lucroGreenBruto  = somaStakes;
  const lucroGreenLiq    = lucroGreenBruto * (1 - comPct);

  // RED por linha: saldo = somaStakes - stake_vencedora - responsabilidade_vencedora
  // Com comissão: o green das outras stakes perde comissão, mas a responsabilidade não
  const saldosRed = stakes.map((s,i) => {
    // recebe de volta as stakes das linhas que NÃO bateram (sem a do vencedor)
    const stakesRecebidas = (somaStakes - s) * (1 - comPct);
    return stakesRecebidas - resps[i];
  });

  const piorRed   = Math.min(...saldosRed);
  const melhorRed = Math.max(...saldosRed);
  const temForcada= forcadas.some(Boolean);
  const roi       = somaResp>0 ? lucroGreenLiq/somaResp : 0;
  const riskPct   = banca>0 ? Math.abs(piorRed)/banca : 0;

  // simetria
  const mediaRed = saldosRed.reduce((a,b)=>a+b,0)/saldosRed.length;
  const desvio   = Math.sqrt(saldosRed.reduce((a,b)=>a+Math.pow(b-mediaRed,2),0)/saldosRed.length);
  const simetrico= desvio < 0.05;

  ultimoCalculo = { banca, odds:[...odds], stakes:[...stakes], lucroGreenBruto, lucroGreenLiq, somaResp, piorRed, comPct };

  // ── barras de simetria
  const maxAbs  = Math.max(...saldosRed.map(v=>Math.abs(v)));
  const simBars = saldosRed.map((v,i) => {
    const h = maxAbs>0 ? Math.round((Math.abs(v)/maxAbs)*26) : 4;
    return `<div class="sim-bar" style="height:${h}px" title="Linha ${i+1}: ${fmt(v)}"></div>`;
  }).join('');

  // ── cards de resultado
  const compactClass = modoCompacto ? ' compact' : '';
  const fixaBadge = modoFixa ? '<span class="forced-badge" style="background:var(--blue-dim);color:var(--blue)">FIXA</span>' : '';

  const cardsHtml = stakes.map((s,i) => `
    <div class="result-card ${!modoFixa && forcadas[i] ? 'forced' : ''}">
      <div class="rc-header">
        <div class="rc-num">LINHA ${i+1}</div>
        <div class="rc-badges">
          <span class="rc-odd">@${odds[i]}</span>
          ${!modoFixa && forcadas[i] ? '<span class="forced-badge">MIN</span>' : ''}
          ${modoFixa && forcadas[i] ? fixaBadge : ''}
        </div>
      </div>
      <div class="rc-stake-label">Stake</div>
      <div class="rc-stake-value" id="stake-${i}">${fmtN(s)}</div>
      <button class="rc-copy-btn" id="cbtn-${i}" onclick="copiar(${i})">Copiar stake</button>
      <div class="rc-divider"></div>
      <div class="rc-meta">
        <span style="color:var(--text-faint)">Resp: <strong style="color:var(--text-muted)">${fmt(resps[i])}</strong></span>
        <span>RED: <span class="rc-red-value">${fmt(saldosRed[i])}</span></span>
      </div>
    </div>
  `).join('');

  // ── sliders de simulação (um por linha)
  const slidersHtml = odds.map((o,i) => {
    const min  = Math.max(1.01, +(o - o*0.3).toFixed(2));
    const max  = +(o + o*0.3).toFixed(2);
    const step = 0.01;
    return `
      <div class="slider-row">
        <span class="slider-linha-label">Linha ${i+1}</span>
        <input type="range" min="${min}" max="${max}" step="${step}" value="${o}"
               oninput="simularSlider(${i}, this.value, ${banca}, '${odds.join(',')}', ${stakeMin}, ${comPct})"
               id="slider-${i}">
        <span class="slider-valor" id="slider-val-${i}">@${o}</span>
      </div>
      <div class="slider-resultado" id="slider-res-${i}"></div>
    `;
  }).join('');

  // ── P&L do histórico
  const pnlHtml = renderPnlHtml();

  res.innerHTML = `
    <div class="box-green">
      <div class="green-main">
        <div class="green-label">✦ Lucro se GREEN${comissaoAtiva?' (líq. comissão)':''}</div>
        <div class="green-value">+${fmt(lucroGreenLiq)}</div>
        <div class="green-sub">Nenhum Lay bate → você recolhe todas as stakes${comissaoAtiva?` (${(comPct*100).toFixed(1)}% comissão descontada)`:''}</div>
      </div>
      <div class="green-pills">
        ${comissaoAtiva ? `<div class="green-pill pill-comissao">
          <div class="green-pill-label">Bruto</div>
          <div class="green-pill-value">${fmt(lucroGreenBruto)}</div>
        </div>` : ''}
        <div class="green-pill">
          <div class="green-pill-label">ROI</div>
          <div class="green-pill-value">${fmtPct(roi)}</div>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-label">Resp. Total</div><div class="stat-value amber">${fmt(somaResp)}</div></div>
      <div class="stat-box"><div class="stat-label">Pior RED</div><div class="stat-value red">${fmt(piorRed)}</div></div>
      <div class="stat-box"><div class="stat-label">Melhor RED</div><div class="stat-value red">${fmt(melhorRed)}</div></div>
      <div class="stat-box"><div class="stat-label">Risco / Banca</div><div class="stat-value muted">${fmtPct(riskPct)}</div></div>
    </div>

    <div class="sim-card">
      <div class="sim-header">
        <span class="sim-title-text">Distribuição do RED por linha</span>
        <span class="sim-badge ${simetrico?'ok':'warn'}">${simetrico?'✓ Simétrico':'~ Assimétrico'}</span>
      </div>
      <div class="sim-bars-wrap">${simBars}</div>
      <div class="sim-sub">${simetrico
        ? 'RED distribuído uniformemente entre todas as linhas.'
        : 'Variação no RED entre as linhas'+(temForcada&&!modoFixa?' (stake mínima aplicada).':'.')}</div>
    </div>

    <div class="slider-section">
      <div class="slider-header">
        <span class="slider-title">Simulador — e se a odd mudar?</span>
        <button onclick="resetarSliders()" style="background:transparent;border:none;font-family:var(--mono);font-size:.65rem;color:var(--text-faint);cursor:pointer;padding:0">↺ Resetar</button>
      </div>
      ${slidersHtml}
    </div>

    <div class="cards-grid${compactClass}">${cardsHtml}</div>

    ${pnlHtml}

    ${temForcada && !modoFixa ? `<div class="warn-box">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Stake mínima (${fmtN(stakeMin)}) aplicada — RED assimétrico.
    </div>` : ''}
  `;
}

/* ══════════════════════════════════════════
   SIMULADOR DE SLIDERS
══════════════════════════════════════════ */
function simularSlider(idxMudado, novaOdd, banca, oddsStr, stakeMin, comPct) {
  novaOdd = parseFloat(novaOdd);
  document.getElementById(`slider-val-${idxMudado}`).textContent = '@'+fmtN(novaOdd);

  const odds = oddsStr.split(',').map(Number);
  odds[idxMudado] = novaOdd;
  const n = odds.length;

  // recalcular rápido
  const stakes = new Array(n).fill(0), resps = new Array(n).fill(0);
  const respBase = banca/n;
  for (let i=0;i<n;i++) {
    let s = respBase/(odds[i]-1);
    if (s<stakeMin) s = stakeMin;
    stakes[i]=s; resps[i]=s*(odds[i]-1);
  }
  const usada = resps.reduce((a,b)=>a+b,0);
  const restante = banca-usada;
  const validos = [];
  for(let i=0;i<n;i++){if(stakes[i]>stakeMin||resps[i]>stakeMin*(odds[i]-1))validos.push(i);}
  if(validos.length>0&&restante>0){
    const extra=restante/validos.length;
    validos.forEach(i=>{resps[i]+=extra;stakes[i]=resps[i]/(odds[i]-1);});
  }
  const somaStakes = stakes.reduce((a,b)=>a+(isNaN(b)?0:b),0);
  const lucroLiq   = somaStakes*(1-comPct);
  const saldosRed  = stakes.map((s,i) => (somaStakes-s)*(1-comPct) - resps[i]);
  const piorRed    = Math.min(...saldosRed);

  const el = document.getElementById(`slider-res-${idxMudado}`);
  if (el) el.innerHTML = `→ GREEN: <strong>+${fmt(lucroLiq)}</strong> &nbsp;|&nbsp; Pior RED: <span class="red">${fmt(piorRed)}</span>`;
}

function resetarSliders() { calcular(); }

/* ══════════════════════════════════════════
   COPIAR
══════════════════════════════════════════ */
function copiar(i) {
  const valor = document.getElementById(`stake-${i}`).innerText;
  const btn   = document.getElementById(`cbtn-${i}`);
  navigator.clipboard.writeText(valor).then(() => {
    btn.textContent="✓ Copiado"; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent="Copiar stake";btn.classList.remove('copied');},1600);
  });
}

/* ══════════════════════════════════════════
   EXPORTAR TEXTO
══════════════════════════════════════════ */
function exportarTexto() {
  if (!ultimoCalculo) { showToast("⚠ Nada calculado ainda."); return; }
  const { banca, odds, stakes, lucroGreenLiq, somaResp, piorRed, comPct } = ultimoCalculo;
  const linhas = odds.map((o,i) => `  Linha ${i+1} (@${o}): ${fmtN(stakes[i])}`).join('\n');
  const comissaoStr = comPct>0 ? `\n💸 Comissão: ${(comPct*100).toFixed(1)}%` : '';
  const texto = `📊 Multi LAY Pro\n━━━━━━━━━━━━━━━\nResponsabilidade: ${fmt(banca)}${comissaoStr}\n${linhas}\n━━━━━━━━━━━━━━━\n✅ GREEN: +${fmt(lucroGreenLiq)}\n❌ Pior RED: ${fmt(piorRed)}\n📈 ROI: ${(lucroGreenLiq/somaResp*100).toFixed(1)}%`;
  navigator.clipboard.writeText(texto).then(() => showToast("✓ Resumo copiado"));
}

/* ══════════════════════════════════════════
   HISTÓRICO
══════════════════════════════════════════ */
function salvarHistorico() {
  if (!ultimoCalculo) { showToast("⚠ Nada calculado para salvar."); return; }
  const hist  = carregarHist();
  const entry = { id:Date.now(), ts:new Date().toLocaleString('pt-BR'), ...ultimoCalculo };
  hist.unshift(entry);
  if (hist.length>30) hist.length=30;
  localStorage.setItem('multilay_hist', JSON.stringify(hist));
  showToast("✓ Cenário salvo");
}

function carregarHist() {
  try { return JSON.parse(localStorage.getItem('multilay_hist')||'[]'); } catch { return []; }
}

function abrirHistorico()  { renderHistorico(); document.getElementById('backdrop').classList.add('open'); document.getElementById('drawer').classList.add('open'); }
function fecharHistorico() { document.getElementById('backdrop').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }

function renderHistorico() {
  const hist = carregarHist();
  const body = document.getElementById('drawer-body');
  if (!hist.length) { body.innerHTML=`<div class="hist-empty">Nenhum cenário salvo ainda.<br>Calcule e clique em "Salvar".</div>`; return; }
  body.innerHTML = hist.map(e => `
    <div class="hist-item" onclick="carregarCenario(${e.id})">
      <div class="hist-item-header">
        <span class="hist-ts">${e.ts}</span>
        <div style="display:flex;align-items:center">
          <span class="hist-banca">${fmt(e.banca)}</span>
          <button class="hist-del" onclick="deletarHist(event,${e.id})" title="Remover">×</button>
        </div>
      </div>
      <div class="hist-odds">${e.odds.map(o=>`<span class="hist-odd-pill">@${o}</span>`).join('')}</div>
      <div class="hist-green">✦ GREEN: +${fmt(e.lucroGreenLiq||e.lucroGreenBruto)}</div>
    </div>
  `).join('');
}

function carregarCenario(id) {
  const entry = carregarHist().find(e=>e.id===id);
  if (!entry) return;
  document.getElementById("banca").value = entry.banca;
  document.getElementById("odds-container").innerHTML="";
  lineCount=0;
  entry.odds.forEach(o=>addOdd(o));
  calcular(); fecharHistorico();
}

function deletarHist(e, id) {
  e.stopPropagation();
  const hist = carregarHist().filter(x=>x.id!==id);
  localStorage.setItem('multilay_hist', JSON.stringify(hist));
  renderHistorico();
}

function limparHistorico() {
  if (!confirm("Limpar todo o histórico?")) return;
  localStorage.removeItem('multilay_hist');
  renderHistorico();
}

/* ══════════════════════════════════════════
   P&L ACUMULADO
══════════════════════════════════════════ */
function renderPnlHtml() {
  const hist = carregarHist();
  if (!hist.length) return '';

  // só entradas com resultado marcado
  const comResultado = hist.filter(e => e.resultado !== undefined);
  const totalGreen   = comResultado.filter(e=>e.resultado==='green').reduce((a,e)=>a+(e.lucroGreenLiq||e.lucroGreenBruto||0),0);
  const totalRed     = comResultado.filter(e=>e.resultado==='red').reduce((a,e)=>a+(e.piorRed||0),0);
  const saldo        = totalGreen + totalRed;

  return `
    <div class="pnl-panel">
      <div class="pnl-header">
        <span class="pnl-title">P&amp;L Acumulado</span>
        <span style="font-family:var(--mono);font-size:.68rem;color:var(--text-faint)">${comResultado.length} entradas registradas</span>
      </div>
      ${comResultado.length ? `
        <div class="pnl-stats">
          <div class="pnl-stat">
            <div class="pnl-stat-label">Saldo</div>
            <div class="pnl-stat-value" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(saldo)}</div>
          </div>
          <div class="pnl-stat">
            <div class="pnl-stat-label">Total GREEN</div>
            <div class="pnl-stat-value" style="color:var(--green)">+${fmt(totalGreen)}</div>
          </div>
          <div class="pnl-stat">
            <div class="pnl-stat-label">Total RED</div>
            <div class="pnl-stat-value" style="color:var(--red)">${fmt(totalRed)}</div>
          </div>
        </div>` : ''}
      <div class="pnl-list">
        ${hist.slice(0,8).map(e=>`
          <div class="pnl-item">
            <span class="pnl-item-ts">${e.ts.split(' ')[0]}</span>
            <span style="font-family:var(--mono);font-size:.68rem;color:var(--text-muted)">${e.odds.map(o=>'@'+o).join(' ')}</span>
            <span class="pnl-item-result ${e.resultado==='green'?'green':e.resultado==='red'?'red':''}" style="min-width:56px;text-align:right">
              ${e.resultado==='green' ? '+'+fmt(e.lucroGreenLiq||e.lucroGreenBruto) : e.resultado==='red' ? fmt(e.piorRed) : '—'}
            </span>
            <div class="pnl-item-btns">
              ${e.resultado!=='green'?`<button class="pnl-item-btn" title="Marcar GREEN" onclick="marcarResultado(${e.id},'green')">✅</button>`:''}
              ${e.resultado!=='red'  ?`<button class="pnl-item-btn" title="Marcar RED"   onclick="marcarResultado(${e.id},'red')">❌</button>`:''}
              <button class="pnl-item-btn" title="Remover resultado" onclick="marcarResultado(${e.id},null)">↺</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function marcarResultado(id, resultado) {
  const hist = carregarHist();
  const entry = hist.find(e=>e.id===id);
  if (!entry) return;
  entry.resultado = resultado;
  localStorage.setItem('multilay_hist', JSON.stringify(hist));
  calcular(); // re-render inclui pnl
}

/* ══════════════════════════════════════════
   RESET
══════════════════════════════════════════ */
function resetar() {
  document.getElementById("odds-container").innerHTML="";
  document.getElementById("banca").value="";
  lineCount=0; ultimoCalculo=null;
  addOdd(); addOdd(); calcular();
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

/* ══════════════════════════════════════════
   ATALHOS DE TECLADO
══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key==='Escape') fecharHistorico();
  if (e.altKey && e.key==='s') { e.preventDefault(); salvarHistorico(); }
  if (e.altKey && e.key==='r') { e.preventDefault(); resetar(); }
  if (e.altKey && e.key==='c') { e.preventDefault(); toggleCompacto(); }
  if (e.altKey && e.key==='e') { e.preventDefault(); exportarTexto(); }
  if (e.altKey && e.key==='h') { e.preventDefault(); abrirHistorico(); }
});

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
(function init() {
  // tema salvo
  const tema = localStorage.getItem('multilay_theme');
  if (tema) document.documentElement.setAttribute('data-theme', tema);
  // iniciar linhas
  addOdd(); addOdd();
  // carregar da URL se houver
  carregarURL();
})();
</script>
